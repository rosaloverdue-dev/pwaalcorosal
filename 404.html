<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90E2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Подключаем манифест -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Alcorosal</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: #ffffff;
        }
        
        #siteFrame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            background: #ffffff;
        }
        
        /* Скрываем полосу прокрутки если она появляется */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Ваш сайт внутри iframe -->
    <iframe id="siteFrame" src="https://alcorosal.ru"></iframe>
    
    <script>
        // Регистрируем Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker зарегистрирован');
                    })
                    .catch((error) => {
                        console.log('❌ Ошибка:', error);
                    });
            });
        }
        
        // Автоматический перезапуск iframe при ошибке
        const frame = document.getElementById('siteFrame');
        frame.onerror = function() {
            setTimeout(() => {
                frame.src = 'https://alcorosal.ru';
            }, 3000);
        };
    </script>
</body>
</html>
